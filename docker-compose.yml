# 📝 실행: docker compose up --build
# 📝 종료: docker compose down
services:
  chatbot:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env            # ANTHROPIC_API_KEY, GEMINI_API_KEY
    volumes:
      # 📝 검색 인덱스를 볼륨으로 연결하면 이미지 재빌드 없이 갱신 가능
      - ./artifacts/chroma_db:/app/artifacts/chroma_db
      - ./artifacts/faiss:/app/artifacts/faiss
      - ./artifacts/bm25:/app/artifacts/bm25
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
