[project]
name = "chatbot"
version = "0.1.0"
description = "Login-based FastAPI chatbot app with one assistant response and Claude, Gemini, and local fallback engines."
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.69,<1",
    "fastapi>=0.110,<1",
    "google-genai>=1.0,<2",
    "numpy>=1.26,<3",
    "pydantic>=2.6,<3",
    "python-dotenv>=1.0,<2",
    "torch>=2.2,<3",
    "uvicorn[standard]>=0.27,<1",
]

[tool.uv]
package = false
