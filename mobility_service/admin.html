<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOVB 관리자</title>
  <style>
    :root {
      --yellow: #fee500;
      --ink: #191919;
      --muted: #686868;
      --line: #e5e5e5;
      --surface: #f5f5f2;
      --panel: white;
      --danger: #c43c35;
      --blue: #315efb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--surface);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px clamp(18px, 5vw, 70px);
      background: linear-gradient(110deg, #111, #24203f 68%, #131313);
      color: white;
    }
    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: transparent;
    }
    .brand strong { display: block; font-size: 16px; }
    .brand span { display: block; margin-top: 2px; color: #d0d0d5; font-size: 12px; }
    .header-actions { display: flex; gap: 8px; margin-left: auto; }
    button, .home-link {
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      padding: 10px 13px;
      color: white;
      background: rgba(255,255,255,.09);
      font: inherit;
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
    }
    .logout { border: 1px solid rgba(255,255,255,.25); background: transparent; }
    main { width: min(1180px, calc(100% - 32px)); margin: 28px auto 60px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 18px; margin-bottom: 20px; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 38px); }
    .hero p { margin: 7px 0 0; color: var(--muted); }
    .refresh { background: var(--ink); }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat, .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 8px 26px rgba(20,18,36,.05);
    }
    .stat { padding: 18px; }
    .stat span { display: block; color: var(--muted); font-size: 12px; font-weight: 700; }
    .stat strong { display: block; margin-top: 7px; font-size: 28px; font-variant-numeric: tabular-nums; }
    .content { display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; }
    .panel { padding: 20px; overflow: hidden; }
    .panel h2 { margin: 0 0 15px; font-size: 18px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 11px 9px; border-bottom: 1px solid #ededed; text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-size: 12px; }
    .role {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      background: #efeff3;
      font-size: 12px;
      font-weight: 850;
    }
    .role.admin { background: #fff4ac; color: #5d4f00; }
    .order-list { display: grid; gap: 9px; }
    .order {
      display: grid;
      gap: 5px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .order strong { overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
    .order span { color: var(--muted); font-size: 12px; }
    .empty { padding: 24px 0; color: var(--muted); text-align: center; font-size: 13px; }
    .error { color: var(--danger); }
    button:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 2px;
    }
    @media (max-width: 800px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .content { grid-template-columns: 1fr; }
      .hero { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="mark" aria-label="MOVB 로고">
      <svg width="30" height="30" viewBox="0 0 64 64" aria-hidden="true">
        <path d="M16 46V18l16 18 16-18v28" fill="none" stroke="#10254d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="22" y="53" width="20" height="6" rx="3" fill="#ffcc00"/>
      </svg>
    </div>
    <div class="brand"><strong>MOVB 관리자</strong><span>운영 현황 및 사용자 관리</span></div>
    <div class="header-actions">
      <a class="home-link" href="/">서비스 홈</a>
      <button class="logout" type="button" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>
    <div class="hero">
      <div><h1>운영 대시보드</h1><p id="adminGreeting">관리자 권한을 확인하는 중입니다.</p></div>
      <button class="refresh" type="button" onclick="loadDashboard()">새로고침</button>
    </div>

    <section class="stats" aria-label="운영 요약">
      <article class="stat"><span>전체 회원</span><strong id="totalUsers">-</strong></article>
      <article class="stat"><span>일반 회원</span><strong id="regularUsers">-</strong></article>
      <article class="stat"><span>전체 주문</span><strong id="totalOrders">-</strong></article>
      <article class="stat"><span>합승 대기</span><strong id="openPools">-</strong></article>
    </section>

    <div class="content">
      <section class="panel">
        <h2>회원 목록</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>이름</th><th>아이디·이메일</th><th>권한</th><th>가입일</th></tr></thead>
            <tbody id="userRows"><tr><td colspan="4" class="empty">불러오는 중입니다.</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>최근 주문</h2>
        <div class="order-list" id="orderList"><div class="empty">불러오는 중입니다.</div></div>
      </section>
    </div>
  </main>

  <script>
    const byId = id => document.getElementById(id);

    async function request(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {"Content-Type": "application/json", ...(options.headers || {})}
      });
      const body = await response.json().catch(() => ({}));
      if (response.status === 401 || response.status === 403) {
        location.href = "/?admin=1";
        throw new Error("관리자 로그인이 필요합니다.");
      }
      if (!response.ok) throw new Error(body.detail || `HTTP ${response.status}`);
      return body;
    }

    function textCell(value) {
      const cell = document.createElement("td");
      cell.textContent = value ?? "-";
      return cell;
    }

    function renderUsers(users) {
      const body = byId("userRows");
      body.replaceChildren();
      if (!users.length) {
        const row = document.createElement("tr");
        const cell = textCell("회원이 없습니다.");
        cell.colSpan = 4;
        cell.className = "empty";
        row.append(cell);
        body.append(row);
        return;
      }
      users.forEach(user => {
        const row = document.createElement("tr");
        row.append(textCell(user.name));
        row.append(textCell(user.username || user.email));
        const roleCell = document.createElement("td");
        const badge = document.createElement("span");
        badge.className = `role ${user.role === "ADMIN" ? "admin" : ""}`;
        badge.textContent = user.role;
        roleCell.append(badge);
        row.append(roleCell);
        row.append(textCell(new Date(user.createdAt).toLocaleDateString("ko-KR")));
        body.append(row);
      });
    }

    function renderOrders(orders) {
      const list = byId("orderList");
      list.replaceChildren();
      if (!orders.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 주문이 없습니다.";
        list.append(empty);
        return;
      }
      orders.slice(0, 20).forEach(order => {
        const card = document.createElement("article");
        card.className = "order";
        const id = document.createElement("strong");
        id.textContent = order.partnerOrderId;
        const meta = document.createElement("span");
        meta.textContent = `${order.status} · ${new Date(order.updatedAt).toLocaleString("ko-KR")}`;
        card.append(id, meta);
        list.append(card);
      });
    }

    async function loadDashboard() {
      try {
        const [me, summary, users, orders] = await Promise.all([
          request("/api/auth/me"),
          request("/api/admin/summary"),
          request("/api/admin/users"),
          request("/api/admin/orders")
        ]);
        byId("adminGreeting").textContent = `${me.data.user.name}님, 현재 MOVB Sandbox 운영 현황입니다.`;
        byId("totalUsers").textContent = summary.data.users.total.toLocaleString("ko-KR");
        byId("regularUsers").textContent = summary.data.users.users.toLocaleString("ko-KR");
        byId("totalOrders").textContent = summary.data.orders.total.toLocaleString("ko-KR");
        byId("openPools").textContent = summary.data.openPoolRequests.toLocaleString("ko-KR");
        renderUsers(users.data);
        renderOrders(orders.data);
      } catch (error) {
        byId("adminGreeting").textContent = error.message;
        byId("adminGreeting").className = "error";
      }
    }

    async function logout() {
      await request("/api/auth/logout", {method: "POST", body: "{}"});
      location.href = "/";
    }

    loadDashboard();
  </script>
</body>
</html>
